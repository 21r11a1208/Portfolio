backend:
  name: github
  repo: 21r11a1208/Portfolio
  branch: main
  base_url: https://www.anish.works
  auth_endpoint: api/decap/auth
local_backend: true
media_folder: public/uploads
public_folder: /uploads
collections:
  - name: case_studies
    label: Case Studies
    folder: content/case-studies
    create: true
    slug: '{{slug}}'
    fields:
      - { label: Slug, name: slug, widget: string }
      - { label: Title, name: title, widget: string }
      - { label: Type, name: type, widget: select, options: [Case Study, Product Breakdown, PRD, Product Teardown, RCA, Product Enhancement, Metrics] }
      - { label: Status, name: status, widget: select, options: [Production, Self-initiated], required: false }
      - { label: Description, name: description, widget: text }
      - { label: Problem Statement, name: problemStatement, widget: text }
      - { label: Business Impact, name: businessImpact, widget: text, required: false }
      - { label: Read Time, name: readTime, widget: string, default: "5 min read" }
      - { label: Order, name: order, widget: number }
      - { label: Last Modified, name: lastModified, widget: string }
      - { label: Priority, name: priority, widget: number, min: 0, max: 1 }
  - name: experience
    label: Experience
    folder: content/experience
    create: true
    slug: '{{fields.company}}'
    fields:
      - { label: Company, name: company, widget: string }
      - { label: Role, name: role, widget: string }
      - { label: Duration, name: duration, widget: string }
      - { label: Location, name: location, widget: string }
      - { label: Problem Statement, name: problemStatement, widget: text, required: false }
      - { label: Business Impact, name: businessImpact, widget: text, required: false }
      - { label: Highlight, name: highlight, widget: string, required: false }
      - { label: Achievements, name: achievements, widget: list }
      - { label: Order, name: order, widget: number }
  - name: articles
    label: Writing
    folder: content/articles
    create: true
    slug: '{{slug}}'
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Subtitle, name: subtitle, widget: text }
      - { label: Read Time, name: readTime, widget: string }
      - { label: URL, name: url, widget: string }
      - { label: Order, name: order, widget: number }
  - name: site
    label: Site Content
    files:
      - label: About
        name: about
        file: content/site/about.yml
        fields:
          - { label: Paragraph 1, name: paragraph1, widget: text }
          - { label: Paragraph 2, name: paragraph2, widget: text }
          - { label: Paragraph 3, name: paragraph3, widget: text }
          - { label: Personal Line, name: personalLine, widget: text }
      - label: Stats
        name: stats
        file: content/site/stats.yml
        fields:
          - label: Stats
            name: stats
            widget: list
            fields:
              - { label: Value, name: value, widget: number, value_type: float }
              - { label: Suffix, name: suffix, widget: string, required: false }
              - { label: Prefix, name: prefix, widget: string, required: false }
              - { label: Label, name: label, widget: string }
      - label: Skills
        name: skills
        file: content/site/skills.yml
        fields:
          - label: Groups
            name: groups
            widget: list
            fields:
              - { label: Category, name: category, widget: string }
              - { label: Skills, name: skills, widget: list }
