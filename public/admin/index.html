<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <!--
      Next's rewrite serves this file's content AT the url "/admin" (no
      trailing slash) rather than "/admin/index.html" or "/admin/" — see
      next.config.ts. Decap's config loader fetches a page-relative
      "config.yml", which a browser resolves against "/admin" as if "admin"
      were a filename, landing on "/config.yml" (404) instead of
      "/admin/config.yml". This <base> pins every relative URL on the page
      to "/admin/" regardless of which of the three URL shapes it's served at.
    -->
    <base href="/admin/" />

    <!--
      Brand fonts — the same two families the site itself uses (Syne for
      display, DM Sans for body; see src/app/layout.tsx). Loaded straight from
      Google Fonts because this admin page is served outside Next's font
      pipeline. Absolute URLs, so the <base> above doesn't rewrite them.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ─────────────────────────────────────────────────────────────────
         Login-screen branding for the Decap CMS admin.

         Every selector below is scoped to elements that exist ONLY on the
         login screen — StyledAuthenticationPage, LoginButton, DecapLogoIcon,
         LoginButtonIcon. None of them appear in the content editor, so the
         editor renders exactly as stock (i.e. the tested, working UI is left
         untouched). These are Decap's semantic component-name class
         fragments, matched with [class*=...] so they survive the Emotion
         hash prefix changing across decap-cms@^3 CDN builds. If a future
         Decap version renames them, the login just falls back to Decap's
         default look — still fully functional.

         Palette mirrors the site's dark theme (src/app/globals.css):
           bg #0f0f14 · text #f0ede6 · accent lime #c8f060 / #d4f570
         ───────────────────────────────────────────────────────────────── */

      /* Full-viewport backdrop: near-black with a soft lime glow, echoing
         the site's dark hero. Forced to a centered flex column so the
         pseudo-element brand marks and the button stack cleanly. */
      [class*="StyledAuthenticationPage"] {
        background:
          radial-gradient(58% 52% at 50% 36%, rgba(200, 240, 96, 0.12), transparent 70%),
          #0f0f14 !important;
        display: flex !important;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        font-family: "DM Sans", system-ui, sans-serif;
      }

      /* Hide Decap's own wordmark — we render our own brand marks below. */
      span[class*="DecapLogoIcon"] {
        display: none !important;
      }

      /* Wordmark, in the site's display face. */
      [class*="StyledAuthenticationPage"]::before {
        content: "B Anish.";
        order: 1;
        font-family: "Syne", system-ui, sans-serif;
        font-weight: 800;
        font-size: 46px;
        letter-spacing: -0.02em;
        line-height: 1;
        color: #f0ede6;
      }

      /* Eyebrow, in the lime accent — uppercase and letter-spaced to match
         the hero's "PRODUCT BUILDER · 0→1 OPERATOR" eyebrow treatment. */
      [class*="StyledAuthenticationPage"]::after {
        content: "Content Manager";
        order: 2;
        margin-top: 15px;
        margin-bottom: 36px;
        font-family: "DM Sans", system-ui, sans-serif;
        font-weight: 500;
        font-size: 12px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #c8f060;
      }

      /* Login button restyled as the site's accent button: lime fill, dark
         ink, Syne label, soft glow, lift on hover. */
      button[class*="LoginButton"] {
        order: 3;
        background: #c8f060 !important;
        color: #0f0f14 !important;
        font-family: "Syne", system-ui, sans-serif !important;
        font-weight: 700 !important;
        font-size: 15px !important;
        letter-spacing: 0.01em;
        /* Decap's button base pins height:36px + line-height:36px with
           box-sizing:border-box, which would swallow the padding below and
           keep the button squat. Release both so the padding defines a
           taller, more deliberate button. */
        height: auto !important;
        line-height: 1.1 !important;
        padding: 14px 30px !important;
        border-radius: 10px !important;
        box-shadow: 0 8px 30px rgba(200, 240, 96, 0.18) !important;
        transition: transform 0.18s ease, background 0.18s ease,
          box-shadow 0.18s ease !important;
      }
      button[class*="LoginButton"]:hover {
        background: #d4f570 !important;
        transform: translateY(-2px);
        box-shadow: 0 12px 38px rgba(200, 240, 96, 0.26) !important;
      }
      /* Recolor the GitHub glyph to the dark ink so it reads on the lime
         fill (the icon otherwise inherits Decap's light-on-dark color). */
      button[class*="LoginButton"] span[class*="LoginButtonIcon"],
      button[class*="LoginButton"] svg,
      button[class*="LoginButton"] svg path {
        color: #0f0f14 !important;
        fill: #0f0f14 !important;
      }

      /* ═══ Editor chrome (beyond the login screen) ══════════════════════
         Give the CMS's persistent chrome the site's identity WITHOUT
         touching the content-editing surface. Every rule below targets a
         chrome component only — the top App bar, the primary "New" button,
         the collection sidebar — so form fields, widgets and entry cards
         render stock/light and stay fully legible. Decap's default accent
         is blue (#3a69c7); the accents that matter are remapped to lime.

         Light-surface lime uses #4a6e00 (the site's own --accent-text for
         light backgrounds; see globals.css .light) because bright lime is
         unreadable on white. Bright lime #c8f060 is used only on the dark
         header bar. Class fragments are Decap component names matched with
         [class*=...], same robustness rationale as the login rules above. */

      /* Top app bar → dark brand bar with a hairline underline. */
      header[class*="AppHeader"] {
        background: #1a1a22 !important;
        border-bottom: 1px solid rgba(240, 237, 230, 0.08) !important;
        box-shadow: none !important;
        color: rgba(240, 237, 230, 0.62) !important;
      }
      header[class*="AppHeader"] svg {
        fill: currentColor !important;
      }

      /* Header nav + quick-add: cream, lime on hover/active (were grey/blue). */
      [class*="AppHeaderNavLink"],
      [class*="AppHeaderButton"] {
        color: rgba(240, 237, 230, 0.62) !important;
        font-family: "DM Sans", system-ui, sans-serif !important;
      }
      [class*="AppHeaderNavLink"]:hover,
      [class*="AppHeaderButton"]:hover,
      [class*="AppHeaderNavLink"][class*="header-link-active"] {
        color: #c8f060 !important;
      }

      /* Header account dropdown → refined dark ghost button on the dark bar. */
      [class*="AppHeaderActions"] [class*="StyledDropdownButton"] {
        background: #22222e !important;
        color: #f0ede6 !important;
        border: 1px solid rgba(240, 237, 230, 0.10) !important;
        font-family: "DM Sans", system-ui, sans-serif !important;
      }

      /* Primary "New <collection>" button → the site's lime accent button. */
      a[class*="CollectionTopNewButton"] {
        background: #c8f060 !important;
        color: #0f0f14 !important;
        font-family: "Syne", system-ui, sans-serif !important;
        font-weight: 700 !important;
        box-shadow: 0 6px 20px rgba(200, 240, 96, 0.16) !important;
        transition: transform 0.15s ease, box-shadow 0.15s ease,
          background 0.15s ease !important;
      }
      a[class*="CollectionTopNewButton"]:hover {
        background: #d4f570 !important;
        transform: translateY(-1px);
        box-shadow: 0 10px 26px rgba(200, 240, 96, 0.24) !important;
      }

      /* Collection sidebar: swap Decap's blue active-pill for a lime one. */
      a[class*="SidebarNavLink"][class*="sidebar-active"] {
        background: rgba(200, 240, 96, 0.14) !important;
        color: #4a6e00 !important;
        box-shadow: inset 3px 0 0 #c8f060 !important;
      }
      a[class*="SidebarNavLink"]:hover {
        color: #4a6e00 !important;
      }

      /* ── Single-entry editor toolbar ───────────────────────────────────
         The entry editor has no AppHeader — this ToolbarContainer is its
         only top chrome — so it gets the same dark brand bar as the
         collection header, keeping the whole CMS cohesive. Text elements
         are recolored individually (never the container as a whole) so the
         Publish dropdown's popover menu keeps its own dark-on-white text.
         Only the toolbar is touched; the edit form + live preview below
         stay stock/light. */
      [class*="ToolbarContainer"] {
        background: #1a1a22 !important;
        border-bottom: 1px solid rgba(240, 237, 230, 0.08) !important;
        box-shadow: none !important;
      }
      /* Back link, back arrow and preview/meta labels → cream, lime on hover. */
      [class*="ToolbarSectionBackLink"],
      [class*="ToolbarSectionBackLink"] *,
      [class*="BackArrow"],
      [class*="ToolbarSectionMeta"],
      [class*="ToolbarSectionMeta"] * {
        color: rgba(240, 237, 230, 0.72) !important;
      }
      [class*="ToolbarSectionBackLink"]:hover,
      [class*="ToolbarSectionBackLink"]:hover * {
        color: #c8f060 !important;
      }
      /* Toolbar icons follow their (cream) text color… */
      [class*="ToolbarContainer"] svg {
        fill: currentColor !important;
      }
      /* Publish dropdown → the site's lime accent button (primary action).
         Higher specificity than the cream text rules above, so it wins. */
      [class*="ToolbarSectionMain"] [class*="StyledDropdownButton"] {
        background: #c8f060 !important;
        color: #0f0f14 !important;
        font-family: "Syne", system-ui, sans-serif !important;
        font-weight: 700 !important;
        box-shadow: 0 6px 18px rgba(200, 240, 96, 0.16) !important;
      }
      [class*="ToolbarSectionMain"] [class*="StyledDropdownButton"] svg {
        fill: #0f0f14 !important;
      }
      /* Delete entry → red-tinted ghost that reads on the dark bar. */
      [class*="ToolbarSectionMain"] button[class*="ToolbarButton"] {
        background: rgba(214, 0, 50, 0.16) !important;
        color: #ff7089 !important;
      }
    </style>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
